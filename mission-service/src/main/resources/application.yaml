server:
  port: 8084

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/spring-app

  main:
    allow-bean-definition-overriding: true
  application:
    name: MISSION-SERVICE


  datasource:
    url: jdbc:h2:mem:missiondb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  feign:
    client:
      config:
        default:
          connectTimeout: 5000
          readTimeout: 5000


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka